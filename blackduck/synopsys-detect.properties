# Synopsys Detect — LCParkGuard (Park Guard)
# Run from LCParkGuard/:  npm run blackduck:detect
# Monorepo: set detect.source.path=LCParkGuard when invoking from LCmobileApp root

detect.project.name=Park Guard
detect.project.version=0.84.1-rn
detect.project.tool=DETECT

# Must be LCParkGuard when jar is run from monorepo root
detect.source.path=.

# npm — lockfile v3 required for accurate tree (react-native 0.84.1, hermes-compiler 250829098.0.9)
detect.npm.path=package-lock.json
detect.npm.include.dev.dependencies=true
detect.npm.dependency.types.excluded=NONE

# iOS — hermes-engine 250829098.0.9 (separate from npm hermes-compiler)
detect.cocoapods.path=ios/Podfile.lock

detect.detector.search.depth=10
detect.accuracy.required=NONE

# Exclude scan noise (optional — uncomment if Detect walks parent dirs)
# detect.excluded.directories=node_modules,ios/build,ios/Pods,android/build,.git

# Optional CycloneDX SBOM from: npm run blackduck:sbom
# detect.bdio2.path=blackduck/output/bom.json
